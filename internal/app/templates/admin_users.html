<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Users - plain-tex</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <div class="min-h-screen">
      {{template "auth_nav" .}}

      <main class="max-w-7xl mx-auto px-4 py-8 space-y-6">
        {{if .Status}}
        <div
          class="rounded-md border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-800"
        >
          {{.Status}}
        </div>
        {{end}} {{if .Error}}
        <div
          class="rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
        >
          {{.Error}}
        </div>
        {{end}}

        <section class="bg-white rounded-lg shadow p-6 space-y-5">
          <h2 class="text-xl font-semibold text-gray-800">Create User</h2>
          <form
            method="POST"
            action="/admin/users"
            class="grid gap-3 md:grid-cols-4"
          >
            <input
              type="text"
              name="name"
              placeholder="Name"
              class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
            <input
              type="email"
              name="email"
              placeholder="Email"
              required
              class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
            <input
              type="password"
              name="password"
              placeholder="Password"
              minlength="6"
              required
              class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
            <button
              type="submit"
              class="bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition"
            >
              Create User
            </button>
            <label
              class="md:col-span-4 inline-flex items-center gap-2 text-sm text-gray-700"
            >
              <input
                type="checkbox"
                name="is_admin"
                value="1"
                class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
              >
              Grant admin access
            </label>
          </form>
        </section>

        <section class="bg-white rounded-lg shadow p-6">
          <h2 class="text-xl font-semibold text-gray-800 mb-4">Users</h2>
          {{if .Users}}
          <div class="overflow-auto">
            <table class="min-w-full text-sm">
              <thead>
                <tr class="text-left text-gray-500 border-b">
                  <th class="py-2 pr-4">Email</th>
                  <th class="py-2 pr-4">Name</th>
                  <th class="py-2">Role</th>
                </tr>
              </thead>
              <tbody>
                {{range .Users}}
                <tr class="border-b last:border-b-0">
                  <td class="py-2 pr-4 text-gray-800">{{.Email}}</td>
                  <td class="py-2 pr-4 text-gray-600">
                    {{if .Name}}{{.Name}}{{else}}-{{end}}
                  </td>
                  <td class="py-2">{{if .IsAdmin}}admin{{else}}user{{end}}</td>
                </tr>
                {{end}}
              </tbody>
            </table>
          </div>
          {{else}}
          <p class="text-gray-600">No users found.</p>
          {{end}}
        </section>
      </main>
    </div>
  </body>
</html>
