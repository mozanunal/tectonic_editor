<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Project.Name}} - Tectonic Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #editor-container { height: calc(100vh - 64px); }
        #pdf-container { height: calc(100vh - 64px); overflow: auto; }
        #file-sidebar { height: calc(100vh - 64px); }
        .file-item:hover .delete-btn { display: block; }
        .file-item .delete-btn { display: none; }
    </style>
</head>
<body class="bg-gray-100">
<div class="h-screen flex flex-col">
    <nav class="bg-white shadow h-16 flex-shrink-0 z-10">
        <div class="h-full px-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="/" class="text-gray-600 hover:text-gray-800">&larr; Projects</a>
                <span class="font-semibold text-gray-800">{{.Project.Name}}</span>
                <span id="current-file" class="text-sm text-gray-500">main.tex</span>
            </div>
            <div class="flex items-center gap-2">
                <span id="status" class="text-sm text-gray-500"></span>
                <button id="save-btn"
                    class="bg-gray-100 text-gray-700 py-2 px-4 rounded hover:bg-gray-200 transition">
                    Save
                </button>
                <button id="compile-btn"
                    class="bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700 transition">
                    Compile
                </button>
            </div>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden">
        <div id="file-sidebar" class="w-56 bg-gray-800 text-gray-100 flex flex-col flex-shrink-0">
            <div class="p-2 border-b border-gray-700 flex gap-1">
                <button id="new-file-btn" class="flex-1 text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded">
                    + New File
                </button>
                <button id="upload-btn" class="flex-1 text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded">
                    Upload
                </button>
            </div>
            <div id="file-list" class="flex-1 overflow-auto p-2 space-y-1">
            </div>
        </div>

        <div id="editor-container" class="flex-1 border-r"></div>

        <div id="pdf-container" class="w-2/5 bg-gray-200 overflow-auto p-4">
            <div id="pdf-placeholder" class="h-full flex items-center justify-center text-gray-500">Click "Compile" to generate PDF</div>
            <div id="pdf-pages" class="hidden flex flex-col items-center gap-4"></div>
        </div>
    </div>

    <div id="error-panel" class="hidden bg-red-900 text-red-100 p-4 max-h-48 overflow-auto">
        <div class="flex justify-between items-start">
            <pre id="error-content" class="text-sm whitespace-pre-wrap"></pre>
            <button id="close-error" class="text-red-300 hover:text-white ml-4">&times;</button>
        </div>
    </div>
</div>

<input type="file" id="file-input" class="hidden" multiple>

<div id="new-file-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-80">
        <h3 class="text-lg font-semibold mb-4">New File</h3>
        <input type="text" id="new-file-name" placeholder="filename.tex"
            class="w-full px-3 py-2 border rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <div class="flex gap-2 justify-end">
            <button id="cancel-new-file" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">Cancel</button>
            <button id="confirm-new-file" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Create</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const projectId = '{{.Project.ID}}';
    const initialContent = {{.Content}};
    let editor;
    let currentFile = 'main.tex';
    let fileContents = {};
    let unsavedChanges = {};

    fileContents['main.tex'] = initialContent;

    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });

    require(['vs/editor/editor.main'], function () {
        monaco.languages.register({ id: 'latex' });
        monaco.languages.setMonarchTokensProvider('latex', {
            tokenizer: {
                root: [
                    [/\\[a-zA-Z]+/, 'keyword'],
                    [/\{/, 'delimiter.curly'],
                    [/\}/, 'delimiter.curly'],
                    [/\[/, 'delimiter.square'],
                    [/\]/, 'delimiter.square'],
                    [/%.*$/, 'comment'],
                    [/\$[^$]*\$/, 'string'],
                ]
            }
        });

        monaco.languages.register({ id: 'bibtex' });
        monaco.languages.setMonarchTokensProvider('bibtex', {
            tokenizer: {
                root: [
                    [/@[a-zA-Z]+/, 'keyword'],
                    [/\{/, 'delimiter.curly'],
                    [/\}/, 'delimiter.curly'],
                    [/"[^"]*"/, 'string'],
                    [/%.*$/, 'comment'],
                ]
            }
        });

        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: initialContent,
            language: 'latex',
            theme: 'vs-dark',
            fontSize: 14,
            minimap: { enabled: false },
            wordWrap: 'on',
            automaticLayout: true
        });

        editor.onDidChangeModelContent(() => {
            fileContents[currentFile] = editor.getValue();
            unsavedChanges[currentFile] = true;
            updateFileList();
        });

        editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, function () {
            save();
        });

        editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, function () {
            compile();
        });

        loadFileList();
    });

    function getLanguageForFile(filename) {
        if (filename.endsWith('.tex') || filename.endsWith('.sty') || filename.endsWith('.cls')) return 'latex';
        if (filename.endsWith('.bib') || filename.endsWith('.bst')) return 'bibtex';
        return 'plaintext';
    }

    async function loadFileList() {
        const response = await fetch(`/api/projects/${projectId}/files`);
        const files = await response.json();
        renderFileList(files);
    }

    function renderFileList(files) {
        const container = document.getElementById('file-list');
        container.innerHTML = '';

        files.forEach(file => {
            const div = document.createElement('div');
            div.className = 'file-item flex items-center justify-between px-2 py-1 rounded cursor-pointer hover:bg-gray-700' +
                (file.name === currentFile ? ' bg-gray-600' : '');

            const nameSpan = document.createElement('span');
            nameSpan.className = 'text-sm truncate flex-1';
            nameSpan.textContent = file.name + (unsavedChanges[file.name] ? ' *' : '');

            if (file.isText) {
                nameSpan.onclick = () => openFile(file.name);
            } else {
                nameSpan.className += ' text-gray-400';
                nameSpan.title = 'Binary file';
            }

            div.appendChild(nameSpan);

            if (file.name !== 'main.tex') {
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn text-red-400 hover:text-red-300 text-xs px-1';
                deleteBtn.textContent = 'x';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteFile(file.name);
                };
                div.appendChild(deleteBtn);
            }

            container.appendChild(div);
        });
    }

    function updateFileList() {
        loadFileList();
    }

    async function openFile(filename) {
        if (filename === currentFile) return;

        if (!fileContents[filename]) {
            const response = await fetch(`/api/projects/${projectId}/files/${filename}`);
            if (!response.ok) {
                setStatus('Failed to load file', true);
                return;
            }
            fileContents[filename] = await response.text();
        }

        currentFile = filename;
        document.getElementById('current-file').textContent = filename;

        const model = editor.getModel();
        monaco.editor.setModelLanguage(model, getLanguageForFile(filename));
        editor.setValue(fileContents[filename]);

        loadFileList();
    }

    async function save() {
        setStatus('Saving...');
        const content = editor.getValue();
        fileContents[currentFile] = content;

        try {
            const response = await fetch(`/api/projects/${projectId}/files/${currentFile}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `content=${encodeURIComponent(content)}`
            });

            if (response.ok) {
                delete unsavedChanges[currentFile];
                updateFileList();
                setStatus('Saved');
            } else {
                setStatus('Save failed', true);
            }
        } catch (e) {
            setStatus('Save failed', true);
        }
    }

    async function saveAll() {
        for (const filename of Object.keys(unsavedChanges)) {
            const content = fileContents[filename];
            await fetch(`/api/projects/${projectId}/files/${filename}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `content=${encodeURIComponent(content)}`
            });
        }
        unsavedChanges = {};
        updateFileList();
    }

    async function compile() {
        setStatus('Saving all files...');
        await saveAll();

        setStatus('Compiling...');
        hideError();

        const mainContent = fileContents['main.tex'] || '';
        const compileBtn = document.getElementById('compile-btn');
        compileBtn.disabled = true;
        compileBtn.textContent = 'Compiling...';

        try {
            const response = await fetch(`/compile/${projectId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `content=${encodeURIComponent(mainContent)}`
            });

            if (response.ok) {
                const pdfData = await response.arrayBuffer();
                renderPDF(pdfData);
                setStatus('Compiled successfully');
            } else {
                const errorText = await response.text();
                showError(errorText);
                setStatus('Compilation failed', true);
            }
        } catch (e) {
            showError('Network error: ' + e.message);
            setStatus('Compilation failed', true);
        } finally {
            compileBtn.disabled = false;
            compileBtn.textContent = 'Compile';
        }
    }

    async function deleteFile(filename) {
        if (!confirm(`Delete ${filename}?`)) return;

        const response = await fetch(`/api/projects/${projectId}/files/${filename}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            delete fileContents[filename];
            delete unsavedChanges[filename];
            if (currentFile === filename) {
                openFile('main.tex');
            }
            loadFileList();
        } else {
            setStatus('Failed to delete file', true);
        }
    }

    document.getElementById('new-file-btn').onclick = () => {
        document.getElementById('new-file-modal').classList.remove('hidden');
        document.getElementById('new-file-name').focus();
    };

    document.getElementById('cancel-new-file').onclick = () => {
        document.getElementById('new-file-modal').classList.add('hidden');
        document.getElementById('new-file-name').value = '';
    };

    document.getElementById('confirm-new-file').onclick = async () => {
        const filename = document.getElementById('new-file-name').value.trim();
        if (!filename) return;

        const response = await fetch(`/api/projects/${projectId}/files`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `filename=${encodeURIComponent(filename)}`
        });

        if (response.ok) {
            document.getElementById('new-file-modal').classList.add('hidden');
            document.getElementById('new-file-name').value = '';
            fileContents[filename] = '';
            await loadFileList();
            openFile(filename);
        } else {
            alert('Failed to create file');
        }
    };

    document.getElementById('new-file-name').onkeydown = (e) => {
        if (e.key === 'Enter') document.getElementById('confirm-new-file').click();
        if (e.key === 'Escape') document.getElementById('cancel-new-file').click();
    };

    document.getElementById('upload-btn').onclick = () => {
        document.getElementById('file-input').click();
    };

    document.getElementById('file-input').onchange = async (e) => {
        const files = e.target.files;
        for (const file of files) {
            const formData = new FormData();
            formData.append('file', file);

            await fetch(`/api/projects/${projectId}/upload`, {
                method: 'POST',
                body: formData
            });
        }
        e.target.value = '';
        loadFileList();
        setStatus('Files uploaded');
    };

    function setStatus(text, isError = false) {
        const status = document.getElementById('status');
        status.textContent = text;
        status.className = isError ? 'text-sm text-red-500' : 'text-sm text-gray-500';
    }

    function showError(message) {
        document.getElementById('error-panel').classList.remove('hidden');
        document.getElementById('error-content').textContent = message;
    }

    function hideError() {
        document.getElementById('error-panel').classList.add('hidden');
    }

    document.getElementById('close-error').addEventListener('click', hideError);

    async function renderPDF(data) {
        const pdf = await pdfjsLib.getDocument({ data }).promise;
        const container = document.getElementById('pdf-container');
        const pagesContainer = document.getElementById('pdf-pages');

        pagesContainer.innerHTML = '';

        const containerWidth = container.clientWidth - 48;

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 1 });
            const scale = containerWidth / viewport.width;
            const scaledViewport = page.getViewport({ scale });

            const canvas = document.createElement('canvas');
            canvas.width = scaledViewport.width;
            canvas.height = scaledViewport.height;
            canvas.className = 'shadow-lg';

            pagesContainer.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            await page.render({ canvasContext: ctx, viewport: scaledViewport }).promise;
        }

        document.getElementById('pdf-placeholder').classList.add('hidden');
        pagesContainer.classList.remove('hidden');
    }

    document.getElementById('save-btn').addEventListener('click', save);
    document.getElementById('compile-btn').addEventListener('click', compile);
</script>
</body>
</html>
